<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games: Plutonium Network</title>
  <link rel="icon" type="image/png" href="img/brand/icon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/games.css" />
</head>
<body>

  <div id="particles-js"></div>

  <div class="games-page">
    <h1 class="games-page__title">Games</h1>
    <p class="games-page__subtitle">Browse and play games from multiple sources</p>

    <!-- Source tabs -->
    <div class="source-tabs">
      <button class="source-tab active" data-panel="pgcdn">PlutoniumGCDN</button>
      <button class="source-tab" data-panel="lumin">LuminSDK</button>
      <button class="source-tab" data-panel="gnmath">GnMath</button>
      <button class="source-tab" data-panel="history">History</button>
    </div>

    <!-- PlutoniumGCDN panel -->
    <div class="source-panel active" id="panel-pgcdn">

      <!-- Sync badge -->
      <div class="pgcdn-sync-badge" id="pgcdn-sync-badge"></div>

      <!-- Favourites row -->
      <div class="pgcdn-shelf" id="pgcdn-shelf-favs" style="display:none">
        <div class="pgcdn-shelf__header">
          <i class="fa-solid fa-heart"></i> Favourites
        </div>
        <div class="pgcdn-shelf__row" id="pgcdn-favs-row"></div>
      </div>

      <!-- Recent plays row -->
      <div class="pgcdn-shelf" id="pgcdn-shelf-recent" style="display:none">
        <div class="pgcdn-shelf__header">
          <i class="fa-solid fa-clock-rotate-left"></i> Recent
        </div>
        <div class="pgcdn-shelf__row" id="pgcdn-recent-row"></div>
      </div>

      <div class="pgcdn-toolbar">
        <input class="pgcdn-search" id="pgcdn-search" type="search" placeholder="Search games…" />
        <span class="pgcdn-count" id="pgcdn-count"></span>
      </div>
      <div id="pgcdn-grid-wrap">
        <div class="pgcdn-status"><div class="pgcdn-spinner"></div><span>Loading games…</span></div>
      </div>
    </div>

    <!-- LuminSDK panel -->
    <div class="source-panel" id="panel-lumin">
      <div id="lumin-container"></div>
    </div>

    <!-- GnMath panel -->
    <div class="source-panel" id="panel-gnmath">
      <div class="games-placeholder">
        <i class="fa-solid fa-gamepad"></i>
        <span>GnMath games coming soon</span>
      </div>
    </div>

    <!-- History panel -->
    <div class="source-panel" id="panel-history">
      <div class="history-toolbar">
        <input class="history-search" id="history-search" type="search" placeholder="Search history…" />
        <div class="history-sort-group">
          <button class="history-sort-btn active" data-sort="recent" title="Most recent">
            <i class="fa-solid fa-clock"></i>
          </button>
          <button class="history-sort-btn" data-sort="plays" title="Most played">
            <i class="fa-solid fa-fire"></i>
          </button>
          <button class="history-sort-btn" data-sort="az" title="A → Z">
            <i class="fa-solid fa-arrow-down-a-z"></i>
          </button>
        </div>
        <span class="history-count" id="history-count"></span>
        <button class="history-clear-btn" id="history-clear">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>
      <div id="history-list">
        <div class="pgcdn-status"><i class="fa-solid fa-clock-rotate-left"></i><span>No history yet</span></div>
      </div>
    </div>
  </div>

  <!-- Context menu -->
  <div id="pgcdn-ctx-menu" class="hidden"></div>

  <!-- Toast -->
  <div id="pgcdn-toast">
    <span class="toast-msg" id="pgcdn-toast-msg"></span>
    <div class="toast-actions" id="pgcdn-toast-actions"></div>
  </div>

  <!-- Game viewer overlay -->
  <div id="game-viewer">
    <iframe id="game-iframe" allowfullscreen allow="autoplay; fullscreen"></iframe>
    <!-- Restore spinner — shown while cloud saves are being fetched and written back -->
    <div id="game-restore-overlay">
      <div class="game-restore-spinner"></div>
      <span class="game-restore-label">Restoring saves…</span>
    </div>
  </div>

  <!-- Viewer dock bar -->
  <div id="viewer-bar" class="bar-hidden">
    <button class="viewer-btn" id="vbtn-back" title="Back to games" aria-label="Back">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <div class="viewer-bar__sep"></div>
    <span class="viewer-bar__title" id="viewer-title"></span>
    <div class="viewer-bar__sep"></div>
    <button class="viewer-btn" id="vbtn-fav" title="Favourite" aria-label="Favourite">
      <i class="fa-regular fa-heart"></i>
    </button>
    <button class="viewer-btn" id="vbtn-reload" title="Reload game" aria-label="Reload">
      <i class="fa-solid fa-rotate-right"></i>
    </button>
    <button class="viewer-btn" id="vbtn-fullscreen" title="Fullscreen" aria-label="Fullscreen">
      <i class="fa-solid fa-expand"></i>
    </button>
    <button class="viewer-btn" id="vbtn-hide" title="Hide bar" aria-label="Hide bar">
      <i class="fa-solid fa-chevron-down"></i>
    </button>
  </div>

  <!-- Ghost strip to restore hidden bar -->
  <div id="viewer-bar-ghost"></div>

  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
  <script src="js/particles.min.js"></script>
  <script src="js/cloud-store.js"></script>
  <script>
    PlutoniumStore.WORKER_URL = 'https://accounting.cdn.plutoniumnet.work';
  </script>
  <script src="js/nav.js"></script>
  <script src="js/main.js"></script>
  <script src="js/games.js"></script>
</body>
</html>
