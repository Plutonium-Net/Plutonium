<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games — Plutonium Network</title>
  <link rel="icon" type="image/png" href="img/brand/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .games-page {
      position: relative;
      z-index: 1;
      padding: 100px 24px 60px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .games-page__title {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700;
      color: var(--pink);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .games-page__subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 36px;
    }

    /* ── Source tabs ── */
    .source-tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 32px;
    }

    .source-tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 600;
      padding: 10px 18px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }

    .source-tab:hover { color: var(--text); }

    .source-tab.active {
      color: var(--pink);
      border-bottom-color: var(--pink);
    }

    /* ── Panels ── */
    .source-panel { display: none; }
    .source-panel.active { display: block; }

    /* ── LuminSDK container — fills the page width, no extra chrome ── */
    #lumin-container {
      width: 100%;
      min-height: 400px;
    }

    /* ── GnMath & Custom placeholder ── */
    .games-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      color: var(--muted);
      font-size: 0.9rem;
      gap: 12px;
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 16px;
    }

    .games-placeholder i {
      font-size: 2rem;
      opacity: 0.35;
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="games-page">
    <h1 class="games-page__title">Games</h1>
    <p class="games-page__subtitle">Browse and play games from multiple sources</p>

    <!-- Source tabs -->
    <div class="source-tabs">
      <button class="source-tab active" data-panel="pgcdn">PlutoniumGCDN</button>
      <button class="source-tab" data-panel="lumin">LuminSDK</button>
      <button class="source-tab" data-panel="gnmath">GnMath</button>
    </div>

    <!-- PlutoniumGCDN panel -->
    <div class="source-panel active" id="panel-pgcdn">
      <div class="games-placeholder">
        <i class="fa-solid fa-cube"></i>
        <span>PlutoniumGCDN games coming soon</span>
      </div>
    </div>

    <!-- LuminSDK panel -->
    <div class="source-panel" id="panel-lumin">
      <div id="lumin-container"></div>
    </div>

    <!-- GnMath panel -->
    <div class="source-panel" id="panel-gnmath">
      <div class="games-placeholder">
        <i class="fa-solid fa-gamepad"></i>
        <span>GnMath games coming soon</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
  <script>
    // ── Source tab switching ─────────────────────────────────────────────────
    let _luminInited = false;

    document.querySelectorAll('.source-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.source-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.source-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active');

        // Lazy-init LuminSDK on first visit to that tab
        if (tab.dataset.panel === 'lumin' && !_luminInited) {
          _luminInited = true;
          Lumin.init({
            container: '#lumin-container',
            theme: 'dark',
            columns: 6,
            rows: 4,
          });
        }
      });
    });
  </script>

  <script src="js/particles.min.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
