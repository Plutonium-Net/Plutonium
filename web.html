<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web: Plutonium Network</title>
  <link rel="icon" type="image/png" href="img/brand/icon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/web.css" />
</head>
<body class="web-body">

  <div id="particles-js"></div>
  <div id="vanta-bg"></div>
  <div class="browser" id="browser">

    <!-- Left sidebar: tab list -->
    <aside class="browser__sidebar" id="browser-sidebar">
      <div class="browser__sidebar-top">
        <button class="browser__new-tab" id="btn-new-tab" title="New tab">
          <i class="fa-solid fa-plus"></i> New Tab
        </button>
      </div>
      <ul class="browser__tabs" id="tab-list"></ul>
      <div class="browser__sidebar-bottom">
        <span class="browser__status" id="web-status">…</span>
      </div>
    </aside>

    <!-- Right: omnibar + frame stack -->
    <div class="browser__content" id="browser-content">
      <div class="browser__omnibar" id="omnibar">
        <button class="omnibar__btn" id="btn-reload" title="Reload"><i class="fa-solid fa-rotate-right"></i></button>
        <input  class="omnibar__input" id="omnibar-input" type="text"
                placeholder="Search or enter address…" autocomplete="off" spellcheck="false" />
        <button class="omnibar__btn omnibar__btn--go" id="btn-go" title="Go">
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </div>

      <div class="browser__frame-wrap">
      <div class="browser__frames" id="frame-stack">

        <!-- ── New-tab page ───────────────────────────────────────────── -->
        <div class="newtab-page" id="newtab-page">
          <!-- Lightfall WebGL background canvas -->
          <canvas class="nt-lightfall" id="nt-lightfall" aria-hidden="true"></canvas>

          <!-- heading -->
          <div class="nt-brand">
            <span class="nt-brand__name">Pluto</span>
            <span class="nt-brand__sub">(pr0xy)</span>
          </div>

          <!-- DuckDuckGo search bar -->
          <div class="nt-search-wrap">
            <div class="nt-search">
              <img class="nt-search__logo" src="https://duckduckgo.com/favicon.ico" alt="DDG" />
              <input id="nt-search-input" class="nt-search__input" type="text"
                     placeholder="Search with DuckDuckGo…" autocomplete="off" spellcheck="false" />
              <button class="nt-search__btn" id="nt-search-btn">
                <i class="fa-solid fa-arrow-right"></i>
              </button>
            </div>
          </div>

          <!-- Proxy + WISP controls — always visible -->
          <div class="nt-controls">

            <!-- UV / SJ toggle -->
            <div class="nt-toggle-wrap">
              <button class="nt-toggle-btn" data-proxy="uv" id="nt-btn-uv">
                <span class="nt-toggle-btn__pip"></span> Ultraviolet
              </button>
              <button class="nt-toggle-btn" data-proxy="sj" id="nt-btn-sj">
                <span class="nt-toggle-btn__pip"></span> ScramJet
              </button>
              <button class="nt-toggle-btn" data-proxy="hb" id="nt-btn-hb">
                <span class="nt-toggle-btn__pip"></span> Hyperbeam
              </button>
            </div>

            <!-- WISP server dropdown -->
            <div class="nt-wisp-wrap">
              <div class="nt-dropdown" id="nt-wisp-dropdown">
                <button class="nt-dropdown__trigger" id="nt-dropdown-trigger">
                  <span id="nt-dropdown-label"><img class="nt-dropdown__flag" src="img/flags/us.png" alt="US"> Virginia</span>
                  <i class="fa-solid fa-chevron-down nt-dropdown__arrow"></i>
                </button>
                <ul class="nt-dropdown__menu" id="nt-dropdown-menu">
                  <li class="nt-dropdown__item" data-value="wss://wisp-us-east-1.cgamz.online/"><img class="nt-dropdown__flag" src="img/flags/us.png" alt="US"> Virginia</li>
                  <li class="nt-dropdown__item" data-value="wss://wisp-us-east-2.cgamz.online/"><img class="nt-dropdown__flag" src="img/flags/us.png" alt="US"> Ohio</li>
                  <li class="nt-dropdown__item" data-value="wss://wisp-us-west.cgamz.online/"><img class="nt-dropdown__flag" src="img/flags/us.png" alt="US"> Oregon</li>
                  <li class="nt-dropdown__item" data-value="wss://wisp-europe.cgamz.online/"><img class="nt-dropdown__flag" src="img/flags/eu.png" alt="EU"> Frankfurt</li>
                  <li class="nt-dropdown__item" data-value="wss://wisp-asia.cgamz.online/"><img class="nt-dropdown__flag" src="img/flags/sg.png" alt="SG"> Singapore</li>
                </ul>
              </div>
            </div>

            <span id="nt-status" class="nt-status">…</span>
          </div>

          <!-- Pins -->
          <div class="nt-pins-wrap">
            <div class="nt-pins" id="nt-pins"></div>
            <button class="nt-add-pin" id="nt-add-pin" title="Add pin">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>

        </div><!-- /newtab-page -->

        <!-- ── Add-pin popup ──────────────────────────────────────────── -->
        <div class="pin-popup-backdrop" id="pin-popup-backdrop" aria-hidden="true">
          <div class="pin-popup" role="dialog" aria-modal="true" aria-labelledby="pin-popup-title">
            <div class="pin-popup__header">
              <span class="pin-popup__brand">Pluto <span class="pin-popup__brand-sub">(pr0xy)</span></span>
              <h2 class="pin-popup__title" id="pin-popup-title">Add Pin</h2>
            </div>
            <label class="pin-popup__label" for="pin-popup-url">URL</label>
            <input class="pin-popup__input" id="pin-popup-url" type="text"
                   placeholder="https://example.com" autocomplete="off" spellcheck="false" />
            <label class="pin-popup__label" for="pin-popup-name">Name <span class="pin-popup__label-opt">(optional)</span></label>
            <input class="pin-popup__input" id="pin-popup-name" type="text"
                   placeholder="e.g. YouTube" autocomplete="off" />
            <div class="pin-popup__actions">
              <button class="pin-popup__btn pin-popup__btn--cancel" id="pin-popup-cancel">Cancel</button>
              <button class="pin-popup__btn pin-popup__btn--add" id="pin-popup-add">Add Pin</button>
            </div>
          </div>
        </div>

      </div>
      </div><!-- /frame-wrap -->
    </div>
  </div>

  <script src="bg/js/particles.min.js"></script>
  <script src="bg/js/three.min.js"></script>
  <script src="bg/js/p5.min.js"></script>
  <script src="bg/js/vanta.birds.min.js"></script>
  <script src="bg/js/vanta.fog.min.js"></script>
  <script src="bg/js/vanta.waves.min.js"></script>
  <script src="bg/js/vanta.clouds.min.js"></script>
  <script src="bg/js/vanta.globe.min.js"></script>
  <script src="bg/js/vanta.net.min.js"></script>
  <script src="bg/js/vanta.trunk.min.js"></script>
  <script src="bg/js/vanta.topology.min.js"></script>
  <script src="bg/js/vanta.dots.min.js"></script>
  <script src="bg/js/vanta.rings.min.js"></script>
  <script src="bg/js/vanta.halo.min.js"></script>
  <script src="js/lightfall.js"></script>
  <script src="js/cloud-store.js"></script>
  <script>
    PlutoniumStore.WORKER_URL = 'https://accounting.cdn.plutoniumnet.work';
  </script>
  <script src="js/nav.js"></script>
  <script src="bg/js/bg-init.js"></script>
  <script src="baremux/index.js"></script>
  <script src="uv/uv.bundle.js"></script>
  <script src="uv/uv.config.js"></script>
  <script type="module" src="sj/scramjet.bundle.js"></script>
  <script type="module" src="js/web.js"></script>
</body>
</html>
