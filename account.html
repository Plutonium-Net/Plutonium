<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account — Plutonium Network</title>
  <link rel="icon" type="image/png" href="img/brand/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Account page layout ── */
    .account-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
    }

    .account-card {
      background: rgba(10, 10, 10, 0.82);
      border: 1px solid rgba(232, 23, 93, 0.18);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .account-card__logo {
      width: 52px;
      height: 52px;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .account-card__title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--pink);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .account-card__subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 36px;
    }

    /* ── Signed-out view ── */
    #view-signed-out { display: block; }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 10px 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .auth-tab.active {
      color: var(--pink);
      border-bottom-color: var(--pink);
    }

    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    .auth-field {
      margin-bottom: 14px;
      text-align: left;
    }

    .auth-field label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .auth-field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.88rem;
      color: var(--text);
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.15s;
    }

    .auth-field input:focus {
      border-color: rgba(232, 23, 93, 0.5);
    }

    .auth-submit-btn {
      width: 100%;
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.18s ease, transform 0.12s ease;
    }

    .auth-submit-btn:hover { background: #c41050; transform: translateY(-1px); }
    .auth-submit-btn:active { transform: translateY(0); }

    .auth-forgot {
      display: block;
      margin-top: 12px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: underline;
    }

    .auth-forgot:hover { color: var(--pink); }

    .account-card__sign-in-error {
      margin-top: 14px;
      font-size: 0.78rem;
      color: #ff6b6b;
      min-height: 18px;
    }

    .auth-success {
      margin-top: 14px;
      font-size: 0.78rem;
      color: #6bffb8;
      min-height: 18px;
    }

    /* ── Signed-in view ── */
    #view-signed-in { display: none; }

    .account-profile__avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(232, 23, 93, 0.5);
      object-fit: cover;
      margin-bottom: 14px;
    }

    .account-profile__avatar-placeholder {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(232, 23, 93, 0.5);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      font-size: 2.2rem;
      color: var(--muted);
    }

    .account-profile__name {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .account-profile__email {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .account-profile__uid {
      font-size: 0.7rem;
      color: rgba(160,160,160,0.55);
      font-family: monospace;
      letter-spacing: 0.04em;
      margin-bottom: 28px;
    }

    .account-card__sign-out-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 9px 22px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.18s ease, border-color 0.18s ease;
    }

    .account-card__sign-out-btn:hover {
      color: var(--pink);
      border-color: rgba(232, 23, 93, 0.35);
    }

    /* ── Loading spinner ── */
    #view-loading { display: none; }
    .account-spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(232, 23, 93, 0.2);
      border-top-color: var(--pink);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .account-spinner-label {
      margin-top: 12px;
      font-size: 0.82rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <section class="account-page">
    <div class="account-card">
      <img class="account-card__logo" src="img/brand/logo.png" alt="Plutonium logo" />
      <h1 class="account-card__title">Plutonium Account</h1>
      <p class="account-card__subtitle">Save your data across all Plutonium features</p>

      <!-- Loading -->
      <div id="view-loading">
        <div class="account-spinner"></div>
        <p class="account-spinner-label">Signing in…</p>
      </div>

      <!-- Signed out -->
      <div id="view-signed-out">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="signin">Sign In</button>
          <button class="auth-tab" data-tab="signup">Create Account</button>
        </div>

        <!-- Sign in panel -->
        <div class="auth-panel active" id="panel-signin">
          <div class="auth-field">
            <label>Email</label>
            <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="auth-field">
            <label>Password</label>
            <input type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <button class="auth-submit-btn" id="btn-sign-in">Sign In</button>
          <button class="auth-forgot" id="btn-forgot">Forgot password?</button>
        </div>

        <!-- Sign up panel -->
        <div class="auth-panel" id="panel-signup">
          <div class="auth-field">
            <label>Display Name</label>
            <input type="text" id="signup-name" placeholder="Your name" autocomplete="name" />
          </div>
          <div class="auth-field">
            <label>Email</label>
            <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="auth-field">
            <label>Password</label>
            <input type="password" id="signup-password" placeholder="Min. 6 characters" autocomplete="new-password" />
          </div>
          <button class="auth-submit-btn" id="btn-sign-up">Create Account</button>
        </div>

        <p class="account-card__sign-in-error" id="sign-in-error"></p>
        <p class="auth-success" id="sign-in-success"></p>
      </div>

      <!-- Signed in -->
      <div id="view-signed-in">
        <div id="profile-avatar-wrap"></div>
        <p class="account-profile__name" id="profile-name"></p>
        <p class="account-profile__email" id="profile-email"></p>
        <p class="account-profile__uid" id="profile-uid"></p>
        <button class="account-card__sign-out-btn" id="btn-sign-out">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
          Sign out
        </button>
      </div>
    </div>
  </section>

  <script src="js/particles.min.js"></script>
  <script src="js/cloud-store.js"></script>
  <script>
    // ── Configure the store ─────────────────────────────────────────────────
    PlutoniumStore.WORKER_URL = 'https://accounting.cdn.plutoniumnet.work';

    // ── View helpers ────────────────────────────────────────────────────────
    const viewLoading   = document.getElementById('view-loading');
    const viewSignedOut = document.getElementById('view-signed-out');
    const viewSignedIn  = document.getElementById('view-signed-in');
    const errorEl       = document.getElementById('sign-in-error');

    function showView(name) {
      viewLoading.style.display   = name === 'loading'    ? 'block' : 'none';
      viewSignedOut.style.display = name === 'signed-out' ? 'block' : 'none';
      viewSignedIn.style.display  = name === 'signed-in'  ? 'block' : 'none';
    }

    function renderProfile(user) {
      document.getElementById('profile-name').textContent  = user.displayName || 'Plutonium User';
      document.getElementById('profile-email').textContent = user.email        || '';
      document.getElementById('profile-uid').textContent   = `UID: ${user.uid}`;

      const wrap = document.getElementById('profile-avatar-wrap');
      wrap.innerHTML = '';
      if (user.photoUrl) {
        const img = document.createElement('img');
        img.src = user.photoUrl;
        img.className = 'account-profile__avatar';
        img.alt = user.displayName || 'Avatar';
        wrap.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'account-profile__avatar-placeholder';
        ph.innerHTML = '<i class="fa-solid fa-circle-user"></i>';
        wrap.appendChild(ph);
      }
    }

    // ── Auth state ──────────────────────────────────────────────────────────
    PlutoniumStore.onAuthChange(user => {
      if (user) {
        renderProfile(user);
        showView('signed-in');
      } else {
        showView('signed-out');
      }
    });

    const successEl = document.getElementById('sign-in-success');

    function clearMessages() {
      errorEl.textContent = '';
      successEl.textContent = '';
    }

    // ── Tabs ────────────────────────────────────────────────────────────────
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
        clearMessages();
      });
    });

    // ── Sign in ─────────────────────────────────────────────────────────────
    document.getElementById('btn-sign-in').addEventListener('click', async () => {
      clearMessages();
      const email    = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      if (!email || !password) { errorEl.textContent = 'Enter your email and password.'; return; }
      showView('loading');
      try {
        await PlutoniumStore.signInWithEmail(email, password);
      } catch (e) {
        console.error(e);
        errorEl.textContent = friendlyError(e.message);
        showView('signed-out');
      }
    });

    // ── Sign up ─────────────────────────────────────────────────────────────
    document.getElementById('btn-sign-up').addEventListener('click', async () => {
      clearMessages();
      const name     = document.getElementById('signup-name').value.trim();
      const email    = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      if (!email || !password) { errorEl.textContent = 'Enter your email and password.'; return; }
      showView('loading');
      try {
        await PlutoniumStore.signUp(email, password, name);
      } catch (e) {
        console.error(e);
        errorEl.textContent = friendlyError(e.message);
        showView('signed-out');
      }
    });

    // ── Forgot password ─────────────────────────────────────────────────────
    document.getElementById('btn-forgot').addEventListener('click', async () => {
      clearMessages();
      const email = document.getElementById('signin-email').value.trim();
      if (!email) { errorEl.textContent = 'Enter your email above first.'; return; }
      try {
        await PlutoniumStore.resetPassword(email);
        successEl.textContent = 'Password reset email sent!';
      } catch (e) {
        errorEl.textContent = friendlyError(e.message);
      }
    });

    // ── Sign out ────────────────────────────────────────────────────────────
    document.getElementById('btn-sign-out').addEventListener('click', async () => {
      await PlutoniumStore.signOut();
    });

    // ── Error messages ───────────────────────────────────────────────────────
    function friendlyError(msg) {
      if (msg.includes('INVALID_LOGIN_CREDENTIALS') || msg.includes('INVALID_PASSWORD') || msg.includes('EMAIL_NOT_FOUND'))
        return 'Incorrect email or password.';
      if (msg.includes('EMAIL_EXISTS'))
        return 'An account with this email already exists.';
      if (msg.includes('WEAK_PASSWORD'))
        return 'Password must be at least 6 characters.';
      if (msg.includes('INVALID_EMAIL'))
        return 'Invalid email address.';
      if (msg.includes('TOO_MANY_ATTEMPTS'))
        return 'Too many attempts — try again later.';
      return 'Something went wrong — please try again.';
    }
  </script>
  <script src="js/nav.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
