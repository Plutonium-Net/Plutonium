<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI: Plutonium Network</title>
  <link rel="icon" type="image/png" href="img/brand/icon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/ai.css" />
</head>
<body>

  <div id="particles-js"></div>

  <!-- Auth gate (shown when signed out) -->
  <div class="ai-gate" id="ai-gate">
    <i class="fa-solid fa-lock ai-gate__icon"></i>
    <div class="ai-gate__heading">Sign in to use AI</div>
    <p class="ai-gate__desc">A Plutonium account is required to use the AI chat. Your conversations are saved to your account.</p>
    <button class="ai-btn ai-btn--primary" id="ai-signin-btn">
      <i class="fa-brands fa-google"></i> Sign in with Google
    </button>
  </div>

  <!-- App (shown when signed in) -->
  <div class="ai-app" id="ai-app" style="display:none">

    <!-- Sidebar -->
    <div class="ai-sidebar" id="ai-sidebar">
      <div class="ai-sidebar__header">
        <span class="ai-sidebar__title">Chats</span>
        <button class="ai-new-chat" id="ai-new-chat">
          <i class="fa-solid fa-plus"></i> New
        </button>
      </div>
      <div class="ai-chat-list" id="ai-chat-list"></div>
    </div>

    <!-- Main -->
    <div class="ai-main">

      <!-- Topbar -->
      <div class="ai-topbar">
        <button class="ai-sidebar-toggle" id="ai-sidebar-toggle" title="Toggle sidebar">
          <i class="fa-solid fa-bars"></i>
        </button>
        <span class="ai-chat-title" id="ai-chat-title">New Chat</span>
        <select class="ai-model-select" id="ai-model-select"></select>
      </div>

      <!-- Messages -->
      <div class="ai-messages" id="ai-messages">
        <div class="ai-empty" id="ai-empty">
          <i class="fa-solid fa-robot"></i>
          <p>Start a conversation</p>
        </div>
      </div>

      <!-- Input -->
      <div class="ai-inputbar">
        <div class="ai-inputbar__inner">
          <textarea class="ai-input" id="ai-input" rows="1" placeholder="Message... (Shift+Enter for new line)"></textarea>
          <button class="ai-send-btn" id="ai-send-btn" title="Send">
            <i class="fa-solid fa-arrow-up"></i>
          </button>
        </div>
        <div class="ai-inputbar__hint">Enter to send - Shift+Enter for new line</div>
      </div>

    </div>
  </div>

  <script src="js/particles.min.js"></script>
  <script src="js/cloud-store.js"></script>
  <script>
    PlutoniumStore.WORKER_URL = 'https://accounting.cdn.plutoniumnet.work';
  </script>
  <script src="js/nav.js"></script>
  <script src="js/main.js"></script>
  <script src="js/ai.js"></script>
</body>
</html>
