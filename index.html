<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plutonium Network</title>
  <link rel="icon" type="image/png" href="img/brand/icon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/settings-apply.js"></script>
</head>
<body>

  <div id="particles-js"></div>

  <section class="hero">
    <div class="hero__inner">
      <img class="hero__logo" src="img/brand/icon.png" alt="Plutonium logo" />
      <h1 class="hero__title">Plutonium Network</h1>
      <p class="hero__desc">
        A next-generation network built for those who are done with individuals.
        High-performance, completely wrapped, and beautifully crafted.
      </p>
      <div class="hero__dock" id="hero-dock">
        <div class="hero__dock-empty">
          <i class="fa-solid fa-thumbtack"></i>
          <span>Right-click any game to pin it here</span>
        </div>
      </div>
    </div>
    <div class="hero__scroller" id="hero-scroller">
      <div class="hero__scroller-track" id="hero-scroller-track"></div>
    </div>
    <div class="hero__scroller" id="hero-scroller-2">
      <div class="hero__scroller-track" id="hero-scroller-track-2"></div>
    </div>
  </section>

  <script src="js/particles.min.js"></script>
  <script src="js/cloud-store.js"></script>
  <script>
    PlutoniumStore.WORKER_URL = 'https://accounting.cdn.plutoniumnet.work';
  </script>
  <script src="js/home-dock.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/main.js"></script>
  <script>
    (async function () {
      try {
        const res = await fetch('https://g.cdn.plutoniumnet.work/config.json');
        const cfg = await res.json();
        const games = (cfg.games || []).filter(g => g.image);

        const track  = document.getElementById('hero-scroller-track');
        const track2 = document.getElementById('hero-scroller-track-2');
        if (!track || !games.length) return;

        const shuffled = [...games].sort(() => Math.random() - 0.5);

        [[track, games], [track2, shuffled]].forEach(([el, list]) => {
          const all = [...list, ...list];
          all.forEach(g => {
            const img = document.createElement('img');
            img.src = 'https://g.cdn.plutoniumnet.work/' + g.image;
            img.alt = g.name;
            img.className = 'hero__scroller-img';
            img.loading = 'lazy';
            img.dataset.gameId = g.id;
            img.dataset.gameName = g.name;
            el.appendChild(img);
          });
          const duration = list.length * 3.2;
          el.style.animationDuration = duration + 's';
        });

        // Hover functionality
        const scrollers = document.querySelectorAll('.hero__scroller');
        
        scrollers.forEach(scroller => {
          const track = scroller.querySelector('.hero__scroller-track');
          
          scroller.addEventListener('mouseenter', () => {
            track.classList.add('paused');
            highlightFocusedImages(scroller);
          });
          
          scroller.addEventListener('mouseleave', () => {
            track.classList.remove('paused');
            removeHighlights(scroller);
          });
          
          scroller.addEventListener('click', (e) => {
            if (e.target.classList.contains('hero__scroller-img') && e.target.classList.contains('highlighted')) {
              const gameId = e.target.dataset.gameId;
              if (gameId) {
                window.location.href = `games.html#${gameId}`;
              }
            }
          });
        });

        function highlightFocusedImages(scroller) {
          const images = scroller.querySelectorAll('.hero__scroller-img');
          const scrollerRect = scroller.getBoundingClientRect();
          const centerY = scrollerRect.top + scrollerRect.height / 2;
          
          const imageDistances = [];
          
          images.forEach(img => {
            const imgRect = img.getBoundingClientRect();
            const imgCenterY = imgRect.top + imgRect.height / 2;
            const distance = Math.abs(centerY - imgCenterY);
            imageDistances.push({ img, distance });
          });
          
          imageDistances.sort((a, b) => a.distance - b.distance);
          
          const top3 = imageDistances.slice(0, 3);
          top3.forEach(item => {
            item.img.classList.add('highlighted');
          });
        }

        function removeHighlights(scroller) {
          const highlighted = scroller.querySelectorAll('.hero__scroller-img.highlighted');
          highlighted.forEach(img => img.classList.remove('highlighted'));
        }

      } catch (_) {}
    })();
  </script>
</body>
</html>
